<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Sizzle - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <img src="images/logo.png" class="logo">
</div>

<div class="categories">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="profile.html">Profile</a>
</div>

<h2 class="section-title">Your Cart</h2>

<div class="order-box" id="cart-items">
    <p>No items added yet</p>
</div>

<div class="order-box">
    <h2>Payment</h2>

    <!-- NAME -->
    <input class="name-input" placeholder="Your Name" style="margin-bottom: 20px;">

    <!-- PHONE -->
    <!-- PHONE -->
    <input class="phone-input" placeholder="Phone Number">

    <!-- ADDRESS -->
    <div class="address-row">
        <input class="address-input" placeholder="Address">
        <button class="location-btn" onclick="getLocation()">📍</button>
    </div>

    <!-- PAYMENT -->
    <select>
        <option>Cash</option>
        <option>Card on Delivery</option>
    </select>

    <button onclick="placeOrder()">Place Order</button>
</div>

<script>
function loadCart() {
    const cart = JSON.parse(localStorage.getItem("cart")) || {};
    const container = document.getElementById("cart-items");

    container.innerHTML = "";

    let subtotal = 0;

    const items = Object.entries(cart);

    if (items.length === 0) {
        container.innerHTML = "<p>No items added yet</p>";
        return;
    }

    items.forEach(([id, data]) => {
        if (!data || !data.qty || !data.price) return;

        const itemTotal = data.qty * data.price;
        subtotal += itemTotal;

        const div = document.createElement("div");
        div.className = "receipt-item";

        div.innerHTML = `
            <div class="receipt-left">
                <span>${id.replace(/_/g, " ")}</span>
            </div>

            <div class="receipt-right">
                <div class="qty-controls">
                    <button onclick="changeCartQty('${id}', -1)">-</button>
                    <span>${data.qty}</span>
                    <button onclick="changeCartQty('${id}', 1)">+</button>
                </div>
                <span class="item-total">${itemTotal.toFixed(2)} OMR</span>
            </div>
        `;

        container.appendChild(div);
    });

    const tax = Math.round(subtotal * 0.05 * 100) / 100;
    const total = Math.round((subtotal + tax) * 100) / 100;

    const summary = document.createElement("div");
    summary.className = "receipt-summary";

    summary.innerHTML = `
        <div class="summary-row">
            <span>Subtotal</span>
            <span>${subtotal.toFixed(2)} OMR</span>
        </div>

        <div class="summary-row">
            <span>Tax (5%)</span>
            <span>${tax.toFixed(2)} OMR</span>
        </div>

        <div class="summary-row total">
            <span>Total</span>
            <span>${total.toFixed(2)} OMR</span>
        </div>
    `;

    container.appendChild(summary);
}

// CHANGE QTY
function changeCartQty(id, change) {
    let cart = JSON.parse(localStorage.getItem("cart")) || {};

    if (!cart[id]) return;

    cart[id].qty += change;

    if (cart[id].qty <= 0) {
        delete cart[id];
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

// LOCATION
function getLocation() {
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        document.querySelector(".address-input").value =
            `https://maps.google.com/?q=${lat},${lng}`;
    });
}

// PLACE ORDER
function placeOrder() {
    const cart = JSON.parse(localStorage.getItem("cart")) || {};

    const name = document.querySelector(".name-input").value;
    const phone = document.querySelector(".phone-input").value;
    const address = document.querySelector(".address-input").value;
    const paymentType = document.querySelector("select").value;

    if (!name || !phone || !address) {
        alert("Please fill in all fields");
        return;
    }

    if (Object.keys(cart).length === 0) {
        alert("Cart is empty");
        return;
    }

    fetch("http://localhost:3000/order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            phone,
            address,
            paymentType,
            cart
        })
    })
    .then(() => {
        alert("Order sent!");
        localStorage.clear();
        location.reload();
    })
    .catch(() => {
        alert("Server not running");
    });
}

loadCart();
</script>

<style>
.order-box name-input {
    margin-bottom: 1000px;
}

.order-box input,
.order-box select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #f5e6d3;
    color: #b30000;
    font-weight: bold;
    display: block;
}

.address-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 10px;
}

.address-input {
    flex: 1;
}

.location-btn {
    width: 60px;
    height: 42px;
    border: none;
    border-radius: 8px;
    background: #f5e6d3;
    color: #b30000;
    font-weight: bold;
    cursor: pointer;
}

.order-box button {
    width: 100%;
    height: 38px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #f5e6d3;
    color: #b30000;
    font-weight: bold;
    cursor: pointer;
}
</style>

</body>
</html>
