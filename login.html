<!DOCTYPE html>
<html>
<head>
    <title>Sizzle Login</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5e6d3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #9B0F06; /* primary red */
            padding: 35px;
            border-radius: 16px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);

            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f5e6d3;

            border: 7px solid #5E0006; /* ✅ dark red outline */
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            background: #f5e6d3; /* cream */
            color: #84221f;
            font-size: 14px;
            text-align: center;
        }

        input::placeholder {
            color: #84221f;
            opacity: 0.6;
        }

        .buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            width: 80%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .primary {
            background: #5E0006; /* dark red */
            color: #f5e6d3;
        }

        .primary:hover {
            background: #5E0006;
        }

        .google {
            background: #5E0006;
            color: #f5e6d3;
            font-weight: bold;
        }

        .google:hover {
            background: #6e1b19;
        }

        .divider {
            margin: 15px 0;
            font-size: 12px;
            color: #f5e6d3;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Sizzle 🍔</h2>
    <p>Login to continue your order!</p>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="buttons">
        <button class="primary" onclick="signup()">Create Account</button>
        <button class="primary" onclick="login()">Login</button>

        <div class="divider">or</div>

        <button class="google" onclick="googleLogin()">Continue with Google</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA0NPkfK_jdoF95XAy0m_dHrFxmTyTr7kE",
    authDomain: "sizzle-oman.firebaseapp.com",
    projectId: "sizzle-oman",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
        .then(() => alert("Account created!"))
        .catch(err => alert(err.message));
}

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
        .then(() => window.location.href = "index.html")
        .catch(err => alert(err.message));
}

function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
        .then(() => window.location.href = "index.html")
        .catch(err => alert(err.message));
}
</script>

</body>
</html>
